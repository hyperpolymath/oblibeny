# eclexiaiser manifest — energy/carbon resource budgets
# SPDX-License-Identifier: PMPL-1.0-or-later

[project]
name = "oblibeny"

[[functions]]
name = "parse_config"
source = "compiler/parse.ml"
energy-budget-mj = 40.0
carbon-budget-mg = 8.0

[[functions]]
name = "eval"
source = "compiler/eval.ml"
energy-budget-mj = 50.0
carbon-budget-mg = 10.0

[carbon]
provider = "static"
region = "GB"
static-intensity = 200.0

[report]
format = "text"
include-recommendations = true
